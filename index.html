<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBISL Campus - Business Etiquette Bilingual Practicum</title>
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts for professional look and Sinhala support -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Sinhala:wght@300;400;600;700&display=swap" rel="stylesheet">
  <!-- React & Babel CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Custom Scrollbar Removal for glass layout sidebar */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    /* Elegant Glowing Orbs background effect */
    .glow-orb {
      filter: blur(120px);
      pointer-events: none;
      position: absolute;
      border-radius: 50%;
      mix-blend-mode: screen;
    }

    /* Print Custom Styles */
    @media print {
      body {
        background: white !important;
        color: black !important;
        font-size: 12px;
      }
      .no-print {
        display: none !important;
      }
      .print-only {
        display: block !important;
      }
      .print-card {
        background: #f9fafb !important;
        border: 1px solid #e5e7eb !important;
        box-shadow: none !important;
        color: #111827 !important;
      }
      .print-text-dark {
        color: #111827 !important;
      }
      .print-text-muted {
        color: #4b5563 !important;
      }
    }
  </style>

  <script>
    // Tailwind Config setup
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#ecfdf5',
              100: '#d1fae5',
              500: '#10b981',
              600: '#059669',
              700: '#047857',
              900: '#064e3b',
              950: '#022c22'
            },
            tech: {
              50: '#eff6ff',
              100: '#dbeafe',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              900: '#1e3a8a',
              950: '#172554'
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            sinhala: ['Noto Sans Sinhala', 'Iskoola Pota', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen relative overflow-x-hidden selection:bg-brand-500 selection:text-slate-950">

  <!-- Background Orbs -->
  <div class="glow-orb bg-brand-900/15 w-[400px] h-[400px] top-10 left-10"></div>
  <div class="glow-orb bg-tech-900/15 w-[500px] h-[500px] bottom-10 right-10"></div>

  <!-- React Root container -->
  <div id="root"></div>

  <!-- React Logic Script -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- CUSTOM RAW SVG INLINE ICONS ---
    const IconCase = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
      </svg>
    );

    const IconDeepDive = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
      </svg>
    );

    const IconScenario = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
      </svg>
    );

    const IconDiagnostic = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
      </svg>
    );

    const IconSim1 = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
      </svg>
    );

    const IconSim2 = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
      </svg>
    );

    const IconSim3 = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H17" />
      </svg>
    );

    const IconChat = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z" />
      </svg>
    );

    const IconPrint = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
      </svg>
    );

    // --- BILINGUAL TEXT RENDERER COMPONENT ---
    // Safely renders English and Sinhala strings depending on state
    const DualLangText = ({ en, si, mode, className = "" }) => {
      if (mode === 'en') {
        return <span className={`block text-slate-100 ${className}`}>{en}</span>;
      }
      if (mode === 'si') {
        return <span className={`block text-slate-100 font-sinhala leading-relaxed ${className}`}>{si}</span>;
      }
      return (
        <span className={`block ${className}`}>
          <span className="block text-slate-100">{en}</span>
          <span className="block text-xs md:text-sm text-slate-400 italic font-sinhala mt-1 leading-relaxed">{si}</span>
        </span>
      );
    };

    // --- MAIN REACT COMPONENT ---
    function App() {
      const [activeTab, setActiveTab] = useState('case');
      const [langMode, setLangMode] = useState('both'); // 'both' | 'en' | 'si'
      
      // Interactive State elements
      // Tab 4 State (Diagnostics Sliders)
      const [eyeSlider, setEyeSlider] = useState(7);
      const [handshakeSlider, setHandshakeSlider] = useState(8);
      const [attireSlider, setAttireSlider] = useState(6);
      const [voiceSlider, setVoiceSlider] = useState(7);
      
      const [responseTime, setResponseTime] = useState(4); // hours
      const [emojisCount, setEmojisCount] = useState(6);
      const [capsOn, setCapsOn] = useState(false);

      // Tab 5 State (Simulation 1 - Email Builder)
      const [emailSalutation, setEmailSalutation] = useState('formal');
      const [emailTone, setEmailTone] = useState('assertive');
      const [emailClosing, setEmailClosing] = useState('formal');
      const [isAnalyzingEmail, setIsAnalyzingEmail] = useState(false);
      const [analysisOutput, setAnalysisOutput] = useState(null);

      // Tab 6 State (Simulation 2 - Cascade)
      const [cascadePosture, setCascadePosture] = useState('upright');
      const [cascadeGreeting, setCascadeGreeting] = useState('perfect');

      // Tab 7 State (Simulation 3 - Workflow)
      const [workflowType, setWorkflowType] = useState('boardroom');

      // Tab 8 State (Breakout Rooms)
      const [activePrompt, setActivePrompt] = useState(1);
      const [votes, setVotes] = useState({ 1: { yes: 14, no: 3 }, 2: { yes: 18, no: 1 }, 3: { yes: 9, no: 12 }, 4: { yes: 22, no: 2 }, 5: { yes: 15, no: 8 } });
      const [userVoted, setUserVoted] = useState({});

      const handleVote = (promptId, type) => {
        if (userVoted[promptId]) return;
        setVotes(prev => ({
          ...prev,
          [promptId]: {
            ...prev[promptId],
            [type]: prev[promptId][type] + 1
          }
        }));
        setUserVoted(prev => ({ ...prev, [promptId]: type }));
      };

      // Handler to simulate Email analyzer
      const triggerEmailAnalysis = () => {
        setIsAnalyzingEmail(true);
        setTimeout(() => {
          setIsAnalyzingEmail(false);
          let score = 0;
          let feedbackEn = "";
          let feedbackSi = "";
          let level = "MEDIUM RISK";
          let color = "text-yellow-400 border-yellow-500/30";

          if (emailSalutation === 'formal') score += 35;
          if (emailTone === 'assertive') score += 35;
          if (emailTone === 'passive') score += 20;
          if (emailClosing === 'formal') score += 30;

          if (score >= 90) {
            level = "EXCELLENT IMPACT (විශිෂ්ට බලපෑමක්)";
            feedbackEn = "This email signals supreme professionalism and respect for corporate hierarchy.";
            feedbackSi = "මෙම විද්‍යුත් තැපෑල මඟින් ඉහළ වෘත්තීය මට්ටමක් සහ ආයතනික ධුරාවලියට ගරු කිරීමක් පෙන්නුම් කරයි.";
            color = "text-emerald-400 border-emerald-500/30";
          } else if (score >= 60) {
            level = "MODERATE RISK (මධ්‍යස්ථ අවදානම)";
            feedbackEn = "Acceptable, but has informal areas. Tone could be sharpened to sound more executive.";
            feedbackSi = "පිළිගත හැකි නමුත් යම් අවිධිමත් කොටස් ඇත. තවදුරටත් විධායක මට්ටමට සකස් කළ හැක.";
            color = "text-yellow-400 border-yellow-500/30";
          } else {
            level = "CRITICAL FAIL (අතිශය අවදානම්)";
            feedbackEn = "Severe Etiquette Gaffe! Highly likely to damage first impressions or trigger conflict.";
            feedbackSi = "බරපතල ආචාරධර්ම කඩවීමක්! පළමු හැඟීම විනාශ කිරීමට හෝ ගැටුමක් ඇති කිරීමට ඉහළ ඉඩක් ඇත.";
            color = "text-red-400 border-red-500/30";
          }

          setAnalysisOutput({ score, level, feedbackEn, feedbackSi, color });
        }, 1200);
      };

      // Calculation for Executive Presence score
      const epScore = parseFloat(((eyeSlider * 0.25) + (handshakeSlider * 0.25) + (attireSlider * 0.25) + (voiceSlider * 0.25)).toFixed(1));

      // Calculation for Netiquette Risk Index
      const calculateNetiquetteRisk = () => {
        let riskVal = 0;
        if (responseTime > 12) riskVal += 3;
        if (responseTime > 24) riskVal += 4;
        riskVal += Math.min(emojisCount * 1.2, 5);
        if (capsOn) riskVal += 4;
        return parseFloat(Math.min(riskVal, 10).toFixed(1));
      };
      const netiquetteRisk = calculateNetiquetteRisk();

      // Sidebar configuration
      const tabs = [
        { id: 'case', labelEn: 'Case Insight', labelSi: 'සිද්ධිය', icon: <IconCase /> },
        { id: 'deep', labelEn: 'Deep Dive Analysis', labelSi: 'විශ්ලේෂණය', icon: <IconDeepDive /> },
        { id: 'scenario', labelEn: 'Scenario Suite', labelSi: 'ප්‍රායෝගික සිදුවීම්', icon: <IconScenario /> },
        { id: 'diagnostic', labelEn: 'Diagnostic Lab', labelSi: 'පරීක්ෂණාගාරය', icon: <IconDiagnostic /> },
        { id: 'sim1', labelEn: 'Email Simulator', labelSi: 'ඊමේල් සිමියුලේටර්', icon: <IconSim1 /> },
        { id: 'sim2', labelEn: 'The Cascade', labelSi: 'ප්‍රතිවිපාක දාමය', icon: <IconSim2 /> },
        { id: 'sim3', labelEn: 'Workflow Sim', labelSi: 'වැඩ ප්‍රවාහය', icon: <IconSim3 /> },
        { id: 'chat', labelEn: 'Breakout Rooms', labelSi: 'කණ්ඩායම් කාමර', icon: <IconChat /> }
      ];

      return (
        <div className="flex flex-col min-h-screen relative z-10">
          
          {/* STICKY TOP HEADER */}
          <header className="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-md border-b border-slate-800/60 py-3 px-4 md:px-6 flex justify-between items-center no-print">
            <div className="flex items-center space-x-3">
              <span className="bg-brand-600 text-slate-950 text-xs font-extrabold px-2 py-1 rounded tracking-wider font-sans">OBISL CAMPUS</span>
              <div>
                <h1 className="text-sm md:text-base font-bold text-white tracking-tight">MODULE 04: BUSINESS ETIQUETTE PRACTICUM</h1>
                <p className="text-xs text-slate-400 font-sans hidden md:block">Interactive Bilingual Command Hub (30-Min Session)</p>
              </div>
            </div>

            <div className="flex items-center space-x-3">
              {/* Language Switcher Button Group */}
              <div className="bg-slate-900 border border-slate-800/80 p-0.5 rounded-lg flex space-x-0.5">
                <button 
                  onClick={() => setLangMode('both')}
                  className={`px-3 py-1 text-xs font-medium rounded transition ${langMode === 'both' ? 'bg-brand-600 text-slate-950 font-bold' : 'text-slate-400 hover:text-slate-100'}`}
                >
                  EN + සිං
                </button>
                <button 
                  onClick={() => setLangMode('en')}
                  className={`px-3 py-1 text-xs font-medium rounded transition ${langMode === 'en' ? 'bg-brand-600 text-slate-950 font-bold' : 'text-slate-400 hover:text-slate-100'}`}
                >
                  English
                </button>
                <button 
                  onClick={() => setLangMode('si')}
                  className={`px-3 py-1 text-xs font-medium rounded transition font-sinhala ${langMode === 'si' ? 'bg-brand-600 text-slate-950 font-bold' : 'text-slate-400 hover:text-slate-100'}`}
                >
                  සිංහල
                </button>
              </div>

              {/* Status Indicator */}
              <div className="flex items-center space-x-2 bg-slate-900/60 border border-slate-800 px-3 py-1 rounded-full">
                <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span className="text-xs text-emerald-400 font-mono tracking-widest uppercase">Live</span>
              </div>
            </div>
          </header>

          <div className="flex-1 flex flex-col md:flex-row relative">
            
            {/* FIXED SIDEBAR NAV (HIDDEN SCROLLBAR) */}
            <aside className="w-full md:w-64 bg-slate-950/60 md:bg-transparent border-r-0 md:border-r border-slate-800/50 p-4 flex flex-col justify-between space-y-4 no-scrollbar shrink-0 no-print">
              <div className="space-y-1.5">
                <p className="text-[10px] uppercase tracking-widest text-slate-500 px-3 mb-2 font-bold font-sans">
                  <DualLangText en="COMMAND CENTER TABS" si="පාලන පුවරු පටිති" mode={langMode} />
                </p>
                <nav className="space-y-1">
                  {tabs.map((tab) => (
                    <button
                      key={tab.id}
                      onClick={() => setActiveTab(tab.id)}
                      className={`w-full flex items-center space-x-3 px-3 py-2.5 rounded-lg text-left transition group relative ${
                        activeTab === tab.id
                          ? 'bg-slate-900 border border-brand-500/30 text-brand-400 font-semibold'
                          : 'hover:bg-slate-900/40 text-slate-400 hover:text-slate-200'
                      }`}
                    >
                      <span className={`transition-transform duration-200 group-hover:scale-110 ${activeTab === tab.id ? 'text-brand-400' : 'text-slate-500'}`}>
                        {tab.icon}
                      </span>
                      <div className="flex-1 text-xs md:text-sm leading-tight">
                        <DualLangText en={tab.labelEn} si={tab.labelSi} mode={langMode} />
                      </div>
                      
                      {/* Tooltip for desktop only */}
                      <div className="absolute left-full ml-2 px-2 py-1 bg-slate-900 text-[10px] text-slate-300 rounded shadow-md opacity-0 group-hover:opacity-100 transition duration-150 pointer-events-none z-50 whitespace-nowrap hidden md:block border border-slate-800">
                        {tab.labelEn}
                      </div>
                    </button>
                  ))}
                </nav>
              </div>

              {/* Sidebar bottom panel with Print utility */}
              <div className="pt-4 border-t border-slate-900">
                <button
                  onClick={() => window.print()}
                  className="w-full flex items-center justify-center space-x-2 bg-slate-900 hover:bg-slate-850 text-slate-300 hover:text-white px-3 py-2.5 rounded-lg border border-slate-800 transition text-xs font-semibold"
                >
                  <IconPrint />
                  <DualLangText en="EXPORT SESSION / PRINT" si="සාරාංශය මුද්‍රණය කරන්න" mode={langMode} />
                </button>
                <div className="mt-2 text-center">
                  <p className="text-[9px] text-slate-500">© 2026 OBISL Campus Ltd.</p>
                </div>
              </div>
            </aside>

            {/* MAIN DYNAMIC CONTENT CONTAINER */}
            <main className="flex-1 p-4 md:p-6 lg:p-8 overflow-y-auto print-container">
              
              {/* PRINT ONLY HEADER */}
              <div className="hidden print-only border-b-2 border-slate-900 pb-4 mb-6">
                <h1 className="text-2xl font-bold">OBISL CAMPUS PRACTICUM WORKSHEET</h1>
                <h2 className="text-lg font-semibold text-gray-700">Module 04: Business Etiquette - Bilingual Realization</h2>
                <p className="text-sm text-gray-500">Practicum Date: May 2026 | Active Hub Content Session Output</p>
              </div>

              {/* DYNAMIC TAB SWITCHING LOGIC */}
              
              {/* TAB 1: CASE INSIGHT */}
              {activeTab === 'case' && (
                <section className="space-y-6">
                  <div className="border-b border-slate-850 pb-3">
                    <h2 className="text-xl font-bold text-white flex items-center space-x-2">
                      <span className="text-brand-500">🌐</span>
                      <DualLangText en="CASE INSIGHT: The Cost of a Seven-Second Gaffe" si="සිද්ධිය: තත්පර 7ක වැරැද්දකින් සිදු වූ බරපතල පාඩුව" mode={langMode} />
                    </h2>
                  </div>

                  {/* Summary of Ground Truth Case */}
                  <div className="bg-slate-900/60 border border-slate-800/85 rounded-xl p-4 md:p-5 print-card">

                              si="ඩිජිටල් නෙටිකට් නම්‍යශීලී සන්නිවේදනයක් ඇති කරයි. මෙහිදී පැහැදිලි බව, තාක්ෂණික බාධා අවම කිරීම සහ අන් අයගේ කාලයට ගරු කිරීම ප්‍රමුඛ වේ."

                                mode={langMode}

                              <span className="font-mono">{votes[activePrompt].yes} votes</span>
                            </div>
                            <div className="w-full bg-slate-950 rounded-full h-1.5 overflow-hidden">
                              <div 
                                className="bg-emerald-500 h-1.5 rounded-full transition-all duration-500" 
                                style={{ width: `${(votes[activePrompt].yes / (votes[activePrompt].yes + votes[activePrompt].no)) * 100}%` }}

                            </div>
                          </div>

                          <div>
                            <div className="flex justify-between text-[10px] text-slate-400 mb-1">
                              <span><DualLangText en="Acceptable Count" si="පිළිගත හැකි ලෙස සලකන" mode={langMode} /></span>
                              <span className="font-mono">{votes[activePrompt].no} votes</span>
                            </div>
                            <div className="w-full bg-slate-950 rounded-full h-1.5 overflow-hidden">
                              <div 
                                className="bg-red-500 h-1.5 rounded-full transition-all duration-500" 
                                style={{ width: `${(votes[activePrompt].no / (votes[activePrompt].yes + votes[activePrompt].no)) * 100}%` }}
                              ></div>
                            </div>
                          </div>
                        </div>

                      </div>

                    </div>

                  </div>
                </section>
              )}

            </main>
          </div>
          
          {/* STATIC DECORATIVE FOOTER */}

            <div>
              <DualLangText en="OBISL Module 04: Realization-Driven Learning Sandbox" si="OBISL මොඩියුලය 04: සැබෑ ලෝකයේ ව්‍යාපාරික ආචාරශීලීත්වය ප්‍රගුණ කිරීම" mode={langMode} />
            </div>
            <div className="mt-1 md:mt-0 font-mono">
              IP Security Token: OFP-M4-ACTIVE | System Status: Verified
